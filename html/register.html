<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kayıt Ol — Cultify</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" type="image/svg+xml" href="../images/main-logo.svg">
</head>

<body>
            <header class="sticky-top">
        <div class="header-left">
            <a href="index.html"><img src="../images/main-logo.svg" alt="Cultify" class="logo-image"></a>
            <div class="logo"><a href="index.html">Cultify</a></div>
        </div>
        <nav class="header-center">
            <a href="index.html">Discover</a>
            <a href="category.html?type=books">Books</a>
            <a href="category.html?type=movies">Movies & TV</a>
            <a href="category.html?type=games">Games</a>
        </nav>
        <div class="header-right">
            <a href="#" class="nav-icon-btn"><i class="fa-solid fa-magnifying-glass"></i></a>
            <!-- Logged-in state -->
            <div class="user-profile dropdown" id="header-logged-in" style="display:none;">
                <a class="nav-icon-btn dropdown-toggle d-flex align-items-center" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false" style="width: auto; padding: 0 12px; border-radius: 20px;">
                    <i class="fa-regular fa-user me-2"></i> <span class="username" style="font-size:14px; font-weight:500;">Kazuma</span>
                </a>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li><a class="dropdown-item" href="profile.html"><i class="fa-regular fa-user me-2"></i>Profile</a></li>
                    <li><a class="dropdown-item" href="mylist.html"><i class="fa-solid fa-list-ul me-2"></i>My List</a></li>
                    <li><a class="dropdown-item" href="setting.html"><i class="fa-solid fa-gear me-2"></i>Settings</a></li>
                    <li><hr class="dropdown-divider"></li>
                    <li><a class="dropdown-item text-danger" href="#" id="logout-btn"><i class="fa-solid fa-right-from-bracket me-2"></i> Log Out</a></li>
                </ul>
            </div>
            <!-- Logged-out state -->
            <div class="user-profile" id="header-logged-out">
                <a href="login.html" class="nav-icon-btn d-flex align-items-center" style="width: auto; padding: 0 16px; border-radius: 20px;">
                    <i class="fa-regular fa-user me-2"></i> <span style="font-size:14px; font-weight:500;">Login</span>
                </a>
            </div>
        </div>
    </header>

    <div class="auth-container">
        <div class="auth-card register-card">
            <!-- Logo -->
            <div class="text-center mb-4">
                <img src="../images/main-logo.svg" alt="Cultify" style="width: 64px; height: 64px;">
            </div>

            <h2 class="auth-title">Kayıt Ol</h2>
            <p class="auth-subtitle">Cultify ailesine katılın!</p>

            <form id="register-form">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="auth-label">İsim</label>
                        <input type="text" class="auth-input" placeholder="İsminiz" style="margin-bottom: 0;">
                    </div>
                    <div class="col-md-6">
                        <label class="auth-label">Soyisim</label>
                        <input type="text" class="auth-input" placeholder="Soyisminiz" style="margin-bottom: 0;">
                    </div>
                    <div class="col-md-6">
                        <label class="auth-label">E-posta</label>
                        <input type="email" class="auth-input" placeholder="ornek@mail.com" style="margin-bottom: 0;">
                    </div>
                    <div class="col-md-6">
                        <label class="auth-label">Şifre</label>
                        <input type="password" class="auth-input" placeholder="••••••••" style="margin-bottom: 0;">
                    </div>
                </div>

                <!-- Avatar Selection -->
                <div class="mt-4">
                    <label class="auth-label text-center d-block">Avatar Seçimi</label>
                    <div class="avatar-selection">
                        <div class="avatar-option selected">
                            <i class="fa-solid fa-user"></i>
                        </div>
                        <div class="avatar-option">
                            <i class="fa-solid fa-user-astronaut"></i>
                        </div>
                        <div class="avatar-option">
                            <i class="fa-solid fa-user-ninja"></i>
                        </div>
                        <div class="avatar-option">
                            <i class="fa-solid fa-user-secret"></i>
                        </div>
                        <div class="avatar-option">
                            <i class="fa-solid fa-user-graduate"></i>
                        </div>
                        <div class="avatar-option">
                            <i class="fa-solid fa-ghost"></i>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn-auth-primary mt-3">
                    <i class="fa-solid fa-user-plus me-2"></i>Kayıt Ol
                </button>
            </form>

            <div class="auth-footer">
                Zaten hesabınız var mı? <a href="login.html" class="auth-link">Giriş Yap</a>
            </div>
        </div>
    </div>

    <footer class="site-footer">
        <p>&copy; 2026 Cultify. Tüm hakları saklıdır. | <a href="#">About Us</a></p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/app.js"></script>
</body>

</html>
