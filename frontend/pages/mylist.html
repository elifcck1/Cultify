<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My List — Cultify</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" type="image/svg+xml" href="../images/main-logo.svg">
</head>

<body>
    <app-header></app-header>

    <main class="container py-5" style="margin-top: 80px;">
        <div class="category-header mb-5">
            <h2 class="fw-bold"><i class="fa-solid fa-list-ul me-2 text-accent"></i>My Watchlist</h2>
            <p class="text-secondary">Your personalized collection of culture.</p>
        </div>

        <div id="mylist-empty" style="display: none;" class="text-center py-5">
            <div class="mb-4"><i class="fa-solid fa-folder-open fa-4x opacity-25"></i></div>
            <h4 class="text-secondary">Your list is currently empty.</h4>
            <a href="index.html" class="btn btn-primary mt-3 px-4" style="background: var(--accent); border:none;">Discover Content</a>
        </div>

        <div class="category-grid" id="mylist-grid">
            <!-- JS will fill this with cards -->
        </div>
    </main>

    <app-footer></app-footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/components.js"></script>
    <script src="../js/app.js"></script>
</body>

</html>
