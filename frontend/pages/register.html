<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — Cultify</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" type="image/svg+xml" href="../images/main-logo.svg">
</head>

<body>
            <app-header></app-header>

    <div class="auth-container">
        <div class="auth-card register-card">
            <!-- Logo -->
            <div class="text-center mb-4">
                <img src="../images/main-logo.svg" alt="Cultify" style="width: 64px; height: 64px;">
            </div>

            <h2 class="auth-title">Register</h2>
            <p class="auth-subtitle">Join the Cultify family!</p>

            <form id="register-form">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="auth-label">First Name</label>
                        <input type="text" class="auth-input" placeholder="Your first name" style="margin-bottom: 0;">
                    </div>
                    <div class="col-md-6">
                        <label class="auth-label">Last Name</label>
                        <input type="text" class="auth-input" placeholder="Your last name" style="margin-bottom: 0;">
                    </div>
                    <div class="col-md-6">
                        <label class="auth-label">Email</label>
                        <input type="email" class="auth-input" placeholder="example@mail.com" style="margin-bottom: 0;">
                    </div>
                    <div class="col-md-6">
                        <label class="auth-label">Password</label>
                        <input type="password" class="auth-input" placeholder="Enter your password" style="margin-bottom: 0;">
                    </div>
                </div>

                <!-- Avatar Selection -->
                <div class="mt-4">
                    <label class="auth-label text-center d-block">Choose Avatar</label>
                    <div class="avatar-selection">
                        <div class="avatar-option selected">
                            <i class="fa-solid fa-user"></i>
                        </div>
                        <div class="avatar-option">
                            <i class="fa-solid fa-user-astronaut"></i>
                        </div>
                        <div class="avatar-option">
                            <i class="fa-solid fa-user-ninja"></i>
                        </div>
                        <div class="avatar-option">
                            <i class="fa-solid fa-user-secret"></i>
                        </div>
                        <div class="avatar-option">
                            <i class="fa-solid fa-user-graduate"></i>
                        </div>
                        <div class="avatar-option">
                            <i class="fa-solid fa-ghost"></i>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn-auth-primary mt-3">
                    <i class="fa-solid fa-user-plus me-2"></i>Register
                </button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="login.html" class="auth-link">Log In</a>
            </div>
        </div>
    </div>

    <app-footer></app-footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/components.js"></script>
    <script src="../js/app.js"></script>
</body>

</html>
