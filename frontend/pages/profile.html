<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile — Cultify</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" type="image/svg+xml" href="../images/main-logo.svg">
</head>

<body>
            <app-header></app-header>

    <main class="container py-5">
        <!-- Profile Header -->
        <div class="content-card mb-5" style="padding: 30px 35px;">
            <div class="row align-items-center">
                <div class="col-md-3 text-center">
                    <div class="profile-avatar-container">
                        <div class="profile-avatar-circle">
                            <i class="fa-solid fa-user"></i>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <h2 class="fw-bold mb-1" style="color: var(--text-primary)">Elif Çiçek</h2>
                    <p style="color: var(--text-secondary)">@elifcicek • Member since 2024</p>

                    <!-- About Me -->
                    <div class="mb-3">
                        <p style="color: var(--text-secondary); font-style: italic;">"I am an AI model developed by Google..."</p>
                    </div>

                </div>
                <div class="col-md-3 text-end mt-3 mt-md-0" id="profile-actions-container">
                    <a href="setting.html" class="btn btn-sm px-4 py-2" style="background-color: var(--accent); color: var(--bg-primary); border-radius: 20px; font-weight: 600;">
                        <i class="fa-solid fa-gear me-2"></i>Edit Profile
                    </a>
                </div>
            </div>
        </div>

        <!-- Profile Stats Row -->
        <div class="row g-4 mb-4">
            <div class="col-md-4">
                <div class="content-card text-center py-4 h-100 d-flex flex-column justify-content-center" id="profile-games-card" style="cursor: pointer; transition: transform 0.3s ease;">
                    <div class="fs-1 fw-bold text-accent mb-2" id="profile-games-stat">0</div>
                    <div class="text-secondary text-uppercase fw-bold" style="letter-spacing: 1px; font-size: 0.9rem;">Games</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="content-card text-center py-4 h-100 d-flex flex-column justify-content-center" id="profile-movies-card" style="cursor: pointer; transition: transform 0.3s ease;">
                    <div class="fs-1 fw-bold text-accent mb-2" id="profile-movies-stat">0</div>
                    <div class="text-secondary text-uppercase fw-bold" style="letter-spacing: 1px; font-size: 0.9rem;">Movies-Series</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="content-card text-center py-4 h-100 d-flex flex-column justify-content-center" id="profile-books-card" style="cursor: pointer; transition: transform 0.3s ease;">
                    <div class="fs-1 fw-bold text-accent mb-2" id="profile-books-stat">0</div>
                    <div class="text-secondary text-uppercase fw-bold" style="letter-spacing: 1px; font-size: 0.9rem;">Books</div>
                </div>
            </div>
        </div>

        <!-- Full Width Content Area -->
        <div class="row g-4">
            <div class="col-12">
                <!-- My List -->
                <div class="content-card mb-4" id="my-list-section">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h5 class="m-0" style="color: var(--text-primary)">
                            <i class="fa-solid fa-heart me-2 text-accent"></i>My List
                        </h5>
                        <a href="mylist.html" class="text-accent text-decoration-none small">See All</a>
                    </div>
                    <p style="color: var(--text-secondary); font-size: 0.9rem;">
                        <i class="fa-solid fa-info-circle me-1 text-accent"></i>
                        Can be added regardless of rating.
                    </p>
                    <div class="swiper profileSwiper">
                        <div class="swiper-wrapper" id="profile-mylist-container">
                            <!-- Dynamic Content Inserted Here -->
                        </div>
                    </div>
                </div>

                <!-- Comments -->
                <div class="content-card">
                    <h5 class="mb-4" style="color: var(--text-primary)">
                        <i class="fa-solid fa-comments me-2 text-accent"></i>Comments
                    </h5>
                    
                    <div class="row g-4" id="profile-reviews-container">
                        <!-- Dynamic Comments Inserted Here -->
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Stats Modal Overlay -->
    <div id="stats-modal" class="modal-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); z-index: 1050; align-items: center; justify-content: center;">
        <div class="content-card w-100" style="max-width: 600px; max-height: 80vh; overflow-y: auto; position: relative;">
            <button id="close-stats-modal" style="position: absolute; top: 15px; right: 15px; background: none; border: none; color: var(--text-secondary); font-size: 1.5rem;"><i class="fa-solid fa-xmark"></i></button>
            <h4 id="stats-modal-title" class="mb-4 text-accent text-center border-bottom pb-3" style="border-color: rgba(255,255,255,0.1) !important;">Category</h4>
            <div id="stats-modal-content" class="d-flex flex-column gap-3">
                <!-- Items will be injected here -->
            </div>
        </div>
    </div>

    <app-footer></app-footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="../js/components.js"></script>
    <script src="../js/testData.js"></script>
    <script src="../js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const viewingUserHandle = urlParams.get('user');
            const currentLoggedUser = getCurrentUser();

            const nameHeading = document.querySelector('h2.fw-bold');
            const handlePara = document.querySelector('p[style*="color: var(--text-secondary)"]');
            const actionsContainer = document.getElementById('profile-actions-container');
            const aboutMePara = document.querySelector('p[style*="font-style: italic"]');
            const avatarCircle = document.querySelector('.profile-avatar-circle');

            let profileUser = null;
            let isOwnProfile = false;

            if (viewingUserHandle) {
                // Try to find the user by handle
                profileUser = getUserByHandle(viewingUserHandle);
                if (currentLoggedUser && profileUser && currentLoggedUser.id === profileUser.id) {
                    isOwnProfile = true;
                }
            } else if (currentLoggedUser) {
                profileUser = currentLoggedUser;
                isOwnProfile = true;
            }

            if (profileUser) {
                const fullName = `${profileUser.firstName} ${profileUser.lastName}`;
                const handle = (profileUser.firstName + profileUser.lastName).toLowerCase().replace(/\s/g, '');

                if (nameHeading) {
                    nameHeading.textContent = fullName;
                    if (profileUser.role === 'admin') {
                        const badge = document.createElement('span');
                        badge.className = 'badge bg-primary ms-2';
                        badge.style.fontSize = '12px';
                        badge.textContent = 'Admin';
                        nameHeading.appendChild(badge);
                    }
                }
                if (handlePara) handlePara.textContent = `@${handle} • Member since ${profileUser.joinYear}`;
                if (aboutMePara) aboutMePara.textContent = profileUser.aboutMe ? `"${profileUser.aboutMe}"` : '"No bio yet."';
                if (avatarCircle) avatarCircle.innerHTML = `<i class="${profileUser.avatar}"></i>`;
                if (!isOwnProfile && actionsContainer) actionsContainer.style.display = 'none';

                document.title = `${fullName} — Cultify`;

                // --- Stats (from ratings) ---
                const ratings = getUserRatings(profileUser.id);
                let gamesCount = 0, moviesCount = 0, booksCount = 0;
                const ratedItems = { games: [], movies: [], books: [] };

                for (const [itemId, rating] of Object.entries(ratings)) {
                    const item = contentDB[itemId];
                    if (!item) continue;
                    const tag = item.tags[0];
                    if (tag === 'Game') { gamesCount++; ratedItems.games.push({ id: itemId, ...item, rating }); }
                    else if (tag === 'Movie' || tag === 'Series') { moviesCount++; ratedItems.movies.push({ id: itemId, ...item, rating }); }
                    else if (tag === 'Book') { booksCount++; ratedItems.books.push({ id: itemId, ...item, rating }); }
                }

                const gamesStatEl = document.getElementById('profile-games-stat');
                const moviesStatEl = document.getElementById('profile-movies-stat');
                const booksStatEl = document.getElementById('profile-books-stat');
                if (gamesStatEl) gamesStatEl.textContent = gamesCount;
                if (moviesStatEl) moviesStatEl.textContent = moviesCount;
                if (booksStatEl) booksStatEl.textContent = booksCount;

                // --- Stats Modal ---
                const statsModal = document.getElementById('stats-modal');
                const modalTitle = document.getElementById('stats-modal-title');
                const modalContent = document.getElementById('stats-modal-content');
                const closeModal = document.getElementById('close-stats-modal');

                function openStatsModal(category, items) {
                    if (!statsModal || !modalTitle || !modalContent) return;
                    modalTitle.textContent = category;
                    modalContent.innerHTML = items.length === 0 ? '<p class="text-secondary text-center">No rated items yet.</p>' :
                        items.map(item => `
                            <a href="detail.html?id=${item.id}" class="d-flex align-items-center gap-3 text-decoration-none p-2" style="background: rgba(255,255,255,0.03); border-radius: 12px;">
                                <img src="${item.img}" style="width: 50px; height: 70px; object-fit: cover; border-radius: 8px;">
                                <div>
                                    <div class="text-light fw-bold">${item.title}</div>
                                    <div class="text-warning small">${'<i class="fa-solid fa-star"></i>'.repeat(item.rating)}</div>
                                </div>
                            </a>
                        `).join('');
                    statsModal.style.display = 'flex';
                }

                if (closeModal) closeModal.addEventListener('click', () => { statsModal.style.display = 'none'; });
                if (statsModal) statsModal.addEventListener('click', (e) => { if (e.target === statsModal) statsModal.style.display = 'none'; });

                const gamesCard = document.getElementById('profile-games-card');
                const moviesCard = document.getElementById('profile-movies-card');
                const booksCard = document.getElementById('profile-books-card');
                if (gamesCard) gamesCard.addEventListener('click', () => openStatsModal('Games', ratedItems.games));
                if (moviesCard) moviesCard.addEventListener('click', () => openStatsModal('Movies & Series', ratedItems.movies));
                if (booksCard) booksCard.addEventListener('click', () => openStatsModal('Books', ratedItems.books));

                // --- My List ---
                const myListSection = document.getElementById('my-list-section');
                if (!isOwnProfile && myListSection) {
                    myListSection.style.display = 'none';
                } else if (myListSection) {
                    const myListContainer = document.getElementById('profile-mylist-container');
                    if (myListContainer) {
                        const list = getUserList(profileUser.id);
                        if (list.length === 0) {
                            myListContainer.innerHTML = '<div class="swiper-slide text-center text-secondary py-4"><em>Your list is currently empty.</em></div>';
                        } else {
                            myListContainer.innerHTML = list.map(itemId => {
                                const item = contentDB[itemId];
                                if (!item) return '';
                                return `<div class="swiper-slide"><a href="detail.html?id=${itemId}" class="text-decoration-none"><div class="content-card p-0 overflow-hidden h-100"><img src="${item.img}" style="width:100%; height:180px; object-fit:cover;"><div class="p-2"><div class="text-light fw-bold small">${item.title}</div></div></div></a></div>`;
                            }).join('');
                        }
                    }
                }

                // --- User Comments ---
                const commentsContainer = document.getElementById('profile-reviews-container');
                function renderUserComments() {
                    if (commentsContainer) {
                        const userComments = getAllCommentsByUser(profileUser.id);
                        if (userComments.length === 0) {
                            commentsContainer.innerHTML = '<div class="col-12 text-center text-secondary py-3"><em>No comments yet.</em></div>';
                        } else {
                            commentsContainer.innerHTML = userComments.map(c => {
                                const item = contentDB[c.itemId];
                                const actionsHtml = isOwnProfile ? `
                                    <div class="d-flex flex-column align-items-end gap-2" style="position: absolute; right: 10px; top: 10px;">
                                        <button onclick="editProfileComment('${c.itemId}', '${c.id}', \`${c.text.replace(/`/g, '\\`')}\`)" class="btn btn-sm btn-outline-light border-0" style="width: 30px; height: 30px; padding: 0;"><i class="fa-solid fa-pen"></i></button>
                                        <button onclick="deleteProfileComment('${c.itemId}', '${c.id}')" class="btn btn-sm btn-outline-danger border-0" style="width: 30px; height: 30px; padding: 0;"><i class="fa-solid fa-trash-can"></i></button>
                                    </div>
                                ` : '';
                                return `<div class="col-md-6" style="position: relative;">
                                    <a href="detail.html?id=${c.itemId}" class="d-flex gap-3 p-3 text-decoration-none h-100" style="background: rgba(19,27,44,0.45); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; padding-right: 45px !important;">
                                        ${item ? `<img src="${item.img}" style="width: 60px; height: 80px; object-fit: cover; border-radius: 8px;">` : ''}
                                        <div>
                                            <div class="text-light fw-bold small mb-1">${item ? item.title : 'Unknown'}</div>
                                            <div class="text-secondary small">"${c.text}"</div>
                                        </div>
                                    </a>
                                    ${actionsHtml}
                                </div>`;
                            }).join('');
                        }
                    }
                }
                renderUserComments();

                window.deleteProfileComment = function(itemId, commentId) {
                    if (confirm('Are you sure you want to delete this comment?')) {
                        deleteComment(itemId, commentId);
                        renderUserComments();
                    }
                };

                window.editProfileComment = function(itemId, commentId, currentText) {
                    const newText = prompt('Edit your comment:', currentText);
                    if (newText !== null && newText.trim() !== '') {
                        editComment(itemId, commentId, newText.trim());
                        renderUserComments();
                    }
                };
            }
        });
    </script>
</body>

</html>
