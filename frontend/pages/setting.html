<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings — Cultify</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" type="image/svg+xml" href="../images/main-logo.svg">
</head>

<body>
            <app-header></app-header>

    <main class="container py-5 d-flex justify-content-center">
        <div class="content-card settings-box">
            <h3 class="mb-4 border-bottom pb-3" style="color: var(--text-primary); border-color: var(--border) !important;">
                <i class="fa-solid fa-gear me-2 text-accent"></i>Account Settings
            </h3>

            <form id="settings-form">
                <!-- Avatar -->
                <div class="text-center mb-5">
                    <div class="profile-avatar-container mt-3 mx-auto" style="position: relative; width: 180px; height: 180px;">
                        <div class="profile-action-buttons">
                            <button type="button" class="profile-edit-button profile-action-btn" id="setting-avatar-edit-btn">
                                <i class="fa-solid fa-pen"></i>
                            </button>
                            <button type="button" class="profile-approve-button profile-action-btn" id="setting-avatar-approve-btn" style="display: none;">
                                <i class="fa-solid fa-check"></i>
                            </button>
                        </div>
                        <div class="profile-avatar-circle" id="setting-avatar-circle">
                            <i class="fa-solid fa-user"></i>
                        </div>
                    </div>
                    <!-- Hidden Avatar Selection Grid -->
                    <div id="setting-avatar-selection-grid" class="mt-4" style="display: none;">
                        <label class="auth-label text-center d-block mb-3">Choose Avatar</label>
                        <div class="avatar-selection justify-content-center">
                            <div class="avatar-option"><i class="fa-solid fa-user"></i></div>
                            <div class="avatar-option"><i class="fa-solid fa-user-astronaut"></i></div>
                            <div class="avatar-option"><i class="fa-solid fa-user-ninja"></i></div>
                            <div class="avatar-option"><i class="fa-solid fa-user-secret"></i></div>
                            <div class="avatar-option"><i class="fa-solid fa-user-graduate"></i></div>
                            <div class="avatar-option"><i class="fa-solid fa-ghost"></i></div>
                        </div>
                    </div>
                </div>

                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="auth-label">First Name</label>
                        <input type="text" class="form-control settings-input" placeholder="Your first name" value="">
                    </div>
                    <div class="col-md-6">
                        <label class="auth-label">Last Name</label>
                        <input type="text" class="form-control settings-input" placeholder="Your last name" value="">
                    </div>
                    <div class="col-md-6">
                        <label class="auth-label">Username</label>
                        <input type="text" class="form-control settings-input" placeholder="Username" value="">
                    </div>
                    <div class="col-md-6">
                        <label class="auth-label">Email</label>
                        <input type="email" class="form-control settings-input" placeholder="example@mail.com" value="">
                    </div>
                    <div class="col-12">
                        <label class="auth-label">About Me</label>
                        <textarea class="form-control settings-input" rows="3" placeholder="Tell us about yourself..."></textarea>
                    </div>

                    <hr style="border-color: var(--border);" class="my-4">

                    <h6 class="text-accent">Update Password</h6>
                    <div class="col-md-6">
                        <input type="password" class="form-control settings-input" placeholder="New Password">
                    </div>
                    <div class="col-md-6">
                        <input type="password" class="form-control settings-input" placeholder="Confirm Password">
                    </div>

                    <div class="col-12 mt-5 text-center d-flex justify-content-around">
                        <button id="update-account" type="submit" class="col-4 btn px-5 py-2"
                            style="background-color: var(--success); color: var(--bg-primary); font-weight: 600;">
                            Update
                        </button>
                        <button id="delete-account" type="button" class="col-4 btn px-5 py-2"
                            style="background-color: var(--danger); color: white; font-weight: 600;">
                            Delete Account
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </main>

    <app-footer></app-footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/components.js"></script>
    <script src="../js/testData.js"></script>
    <script src="../js/app.js"></script>
</body>

</html>
