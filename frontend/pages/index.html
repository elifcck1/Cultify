<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="keywords" content="Cultify, Book Discovery, Games, Movies, Series, Books, Reading">
    <meta name="description" content="Discover your next favorite book, game, or movie with Cultify.">
    <title>Cultify — Discover Culture</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" type="image/svg+xml" href="../images/main-logo.svg">
</head>

<body>
        <app-header></app-header>

    <!-- Login Warning Modal -->
    <div class="login-modal-overlay" id="login-modal">
        <div class="login-modal">
            <i class="fa-solid fa-circle-exclamation modal-icon"></i>
            <h3>Login Required</h3>
            <p>You need to log in to perform this action.</p>
            <button class="btn-login-go" onclick="window.location.href='login.html'">Log In</button>
            <button class="btn-login-close" onclick="closeLoginModal()">Close</button>
        </div>
    </div>

    <main class="container py-5">
        <!-- Split-Hero Layout (The Ultimate Middle Ground) -->
        <div class="split-hero-container mb-5">
            <div class="row g-4 align-items-stretch">
                <!-- Premium Slider (100%) -->
                <div class="col-12">
                    <div class="swiper main-slider shadow-lg" style="border-radius: 24px; overflow: hidden;">
                        <div class="swiper-wrapper" id="main-slider-wrapper">
                            <!-- JS will fill sliders here -->
                        </div>
                        <div class="swiper-pagination"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Books Section -->
        <div class="category-section mb-5">
            <div class="category-header d-flex justify-content-between align-items-end mb-4">
                <div>
                    <h3 class="category-section-title">
                        <i class="fa-solid fa-book me-2 text-accent"></i>Books
                    </h3>
                    <p class="text-secondary small mb-0">Discover our vast library of books.</p>
                </div>
                <a href="category.html?type=books" class="text-accent text-decoration-none fw-bold" style="font-size: 0.9rem;">View More <i class="fa-solid fa-arrow-right ms-1"></i></a>
            </div>
            <div class="category-grid" id="books-grid"></div>
        </div>
        
        <hr class="border-secondary opacity-25 mb-5">

        <!-- Games Section -->
        <div class="category-section mb-5">
            <div class="category-header d-flex justify-content-between align-items-end mb-4">
                <div>
                    <h3 class="category-section-title">
                        <i class="fa-solid fa-gamepad me-2 text-warning"></i>Games
                    </h3>
                    <p class="text-secondary small mb-0">Epic adventures await you.</p>
                </div>
                <a href="category.html?type=games" class="text-warning text-decoration-none fw-bold" style="font-size: 0.9rem;">View More <i class="fa-solid fa-arrow-right ms-1"></i></a>
            </div>
            <div class="category-grid" id="games-grid"></div>
        </div>

        <hr class="border-secondary opacity-25 mb-5">

        <!-- Movies & Series Section -->
        <div class="category-section mb-5">
            <div class="category-header d-flex justify-content-between align-items-end mb-4">
                <div>
                    <h3 class="category-section-title">
                        <i class="fa-solid fa-film me-2 text-success"></i>Movies & Series
                    </h3>
                    <p class="text-secondary small mb-0">Cinematic masterpieces and binge-worthy shows.</p>
                </div>
                <a href="category.html?type=movies" class="text-success text-decoration-none fw-bold" style="font-size: 0.9rem;">View More <i class="fa-solid fa-arrow-right ms-1"></i></a>
            </div>
            <div class="category-grid" id="movies-series-grid"></div>
        </div>

        <!-- Reviews Section -->
        <div class="reviews-section mt-5">
            <h3 class="category-section-title mb-4">
                <i class="fa-solid fa-quote-left me-2 text-accent"></i>Community Reviews
            </h3>
            <div class="row g-4" id="reviews-container"></div>
            <div class="text-center mt-4" id="load-more-reviews-container" style="display: none;">
                <button id="load-more-reviews-btn" style="width: 48px; height: 48px; border-radius: 50%; border: 2px solid var(--accent); background: rgba(168, 85, 247, 0.1); color: var(--accent); font-size: 1.4rem; cursor: pointer; transition: all 0.3s ease; display: inline-flex; align-items: center; justify-content: center;" title="Load more reviews">
                    <i class="fa-solid fa-plus"></i>
                </button>
            </div>
        </div>
    </main>

    <app-footer></app-footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="../js/components.js"></script>
    <script src="../js/testData.js"></script>
    <script src="../js/app.js"></script>
</body>

</html>
