<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In — Cultify</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" type="image/svg+xml" href="../images/main-logo.svg">
</head>

<body>
            <app-header></app-header>

    <div class="auth-container">
        <div class="auth-card">
            <!-- Logo -->
            <div class="text-center mb-4">
                <img src="../images/main-logo.svg" alt="Cultify" style="width: 80px; height: 80px;">
            </div>

            <h2 class="auth-title">Log In</h2>

            <form id="login-form">
                <input type="text" id="email" class="auth-input" placeholder="Email or Username" required>
                <input type="password" id="password" class="auth-input" placeholder="Password" required>

                <button type="submit" class="btn-auth-primary">
                    Log In
                </button>
            </form>

            <div class="auth-footer text-center mt-4">
                <p class="text-secondary small">Don't have an account? <a href="register.html" class="text-white fw-bold" style="text-decoration:none">Register Now</a></p>
            </div>
        </div>
    </div>

    <app-footer></app-footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/components.js"></script>
    <script src="../js/app.js"></script>
</body>

</html>
