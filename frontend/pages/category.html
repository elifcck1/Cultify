<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Category — Cultify</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" type="image/svg+xml" href="../images/main-logo.svg">
</head>

<body>
            <app-header></app-header>

    <main class="container py-5">
        <!-- Category Header -->
        <div class="category-header">
            <h2 class="category-title" id="category-title">
                <i class="fa-solid fa-book me-2 text-accent" id="category-icon"></i>
                <span id="category-name">Books</span>
            </h2>
        </div>

        <!-- ===== BOOKS GRID ===== -->
        <div class="category-grid" id="grid-books">
            <!-- JS will dynamically fill this from contentDB -->
        </div>

        <!-- ===== GAMES GRID ===== -->
        <div class="category-grid" id="grid-games" style="display: none;">
            <!-- JS will dynamically fill this from contentDB -->
        </div>

        <!-- ===== MOVIES GRID ===== -->
        <div class="category-grid" id="grid-movies" style="display: none;">
            <!-- JS will dynamically fill this from contentDB -->
        </div>
    </main>

    <app-footer></app-footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/components.js"></script>
    <script src="../js/testData.js"></script>
    <script src="../js/app.js"></script>
</body>

</html>
