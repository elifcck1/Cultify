<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Detail — Cultify</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" type="image/svg+xml" href="../images/main-logo.svg">
</head>

<body>
            <app-header></app-header>

    <!-- Login Warning Modal -->
    <div class="login-modal-overlay" id="login-modal">
        <div class="login-modal">
            <i class="fa-solid fa-circle-exclamation modal-icon"></i>
            <h3>Login Required</h3>
            <p>You need to log in to perform this action.</p>
            <button class="btn-login-go" onclick="window.location.href='login.html'">Log In</button>
            <button class="btn-login-close" onclick="closeLoginModal()">Close</button>
        </div>
    </div>

    <main class="container py-5">
        <div class="detail-hero">
            <div class="detail-cover">
                <img id="detail-image" src="../images/book.png" alt="Detail Image">
            </div>
            <div class="detail-info">
                <h1 class="detail-title" id="detail-title">Cultify Item</h1>
                <div class="mb-3" id="detail-tags"></div>
                <div class="meta-row">
                    <div class="meta-item"><i class="fa-solid fa-calendar"></i><span id="detail-year">0000</span></div>
                    <div class="meta-item"><i class="fa-solid fa-clock"></i><span id="detail-length">0</span></div>
                    <div class="meta-item"><i class="fa-solid fa-user-pen"></i><span id="detail-creator">Creator</span></div>
                    <div class="meta-item"><i class="fa-solid fa-shield-halved"></i><span id="detail-age">+0</span></div>
                </div>
                <div class="d-flex align-items-center gap-4 mb-3">
                    <div>
                        <p class="small mb-1" style="color: var(--text-secondary)">Your Rating:</p>
                        <div class="star-rating">
                            <i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i>
                            <i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i>
                        </div>
                    </div>
                    <div>
                        <p class="small mb-1" style="color: var(--text-secondary)">Average Rating:</p>
                        <div class="d-flex align-items-center gap-2">
                            <i class="fa-solid fa-star text-warning"></i>
                            <span id="detail-average-rating" class="fw-bold" style="color: var(--text-primary)">0.0</span>
                        </div>
                    </div>
                </div>
                <button class="btn-add-list"><i class="fa-solid fa-plus me-2"></i>Add to My List</button>
            </div>
        </div>

        <div class="content-card mb-4">
            <h5 style="color: var(--text-primary)" class="mb-3"><i class="fa-solid fa-align-left me-2 text-accent"></i>About</h5>
            <p id="detail-desc" style="color: var(--text-secondary); line-height: 1.8;">Loading description...</p>
        </div>

        <div class="content-card">
            <h5 style="color: var(--text-primary)" class="mb-4"><i class="fa-solid fa-comments me-2 text-accent"></i>Comments</h5>
            <div class="comment-input-wrapper">
                <input type="text" placeholder="Write your comment...">
                <button class="comment-send-btn"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
            <div id="detail-comments-container">
                <!-- Comments will be loaded dynamically from testData.js -->
            </div>
        </div>
    </main>

    <app-footer></app-footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/components.js"></script>
    <script src="../js/testData.js"></script>
    <script src="../js/app.js"></script>
</body>
</html>
