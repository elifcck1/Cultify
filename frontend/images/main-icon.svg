<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0f1923"/>
    </linearGradient>
    <linearGradient id="letterGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#93c5fd"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background rounded square -->
  <rect x="2" y="2" width="60" height="60" rx="16" ry="16" fill="url(#bgGrad)" stroke="#60a5fa" stroke-width="1" opacity="0.9"/>
  <!-- Inner glow ring -->
  <rect x="6" y="6" width="52" height="52" rx="12" ry="12" fill="none" stroke="#60a5fa" stroke-width="0.5" opacity="0.3"/>
  <!-- Stylized C letter -->
  <text x="32" y="44" text-anchor="middle" font-family="Georgia, serif" font-size="38" font-weight="bold" fill="url(#letterGrad)" filter="url(#glow)">C</text>
  <!-- Decorative sparkles -->
  <circle cx="48" cy="16" r="2" fill="#93c5fd" opacity="0.8"/>
  <circle cx="50" cy="14" r="1" fill="#e2e8f0" opacity="0.6"/>
  <circle cx="14" cy="48" r="1.5" fill="#60a5fa" opacity="0.5"/>
  <!-- Accent line -->
  <line x1="20" y1="50" x2="44" y2="50" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
</svg>
