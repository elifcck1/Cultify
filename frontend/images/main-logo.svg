<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#fbbf24" />
    </linearGradient>
  </defs>
  
  <rect width="100" height="100" fill="transparent" />

  <!-- Outer Circle -->
  <circle cx="50" cy="50" r="46" stroke="url(#logo-grad)" stroke-width="3" fill="none" />
  
  <!-- Inner ring -->
  <circle cx="50" cy="50" r="42" stroke="url(#logo-grad)" stroke-width="1" fill="none" opacity="0.3" />

  <g stroke="url(#logo-grad)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Star -->
    <path d="M50 14 L59 36 L81 36 L63 50 L70 72 L50 59 L30 72 L37 50 L19 36 L41 36 Z" />
  </g>

  <g stroke="url(#logo-grad)" stroke-width="2" fill="#131b2c" stroke-linecap="round" stroke-linejoin="round">
    <!-- Book -->
    <path d="M 40 24 Q 45 19 50 24 Q 55 19 60 24 L 60 33 Q 55 28 50 33 Q 45 28 40 33 Z" />
    <line x1="50" y1="24" x2="50" y2="33" fill="none" />
    <line x1="42" y1="26.5" x2="48" y2="28.5" fill="none" stroke-width="1"/>
    <line x1="42" y1="29.5" x2="48" y2="31.5" fill="none" stroke-width="1"/>
    <line x1="58" y1="26.5" x2="52" y2="28.5" fill="none" stroke-width="1"/>
    <line x1="58" y1="29.5" x2="52" y2="31.5" fill="none" stroke-width="1"/>
    
    <!-- Gamepad -->
    <rect x="25" y="46" width="20" height="14" rx="3" />
    <line x1="30" y1="50" x2="30" y2="56" fill="none" />
    <line x1="27" y1="53" x2="33" y2="53" fill="none" />
    <circle cx="39" cy="50" r="1.2" fill="url(#logo-grad)" stroke="none" />
    <circle cx="42" cy="54" r="1.2" fill="url(#logo-grad)" stroke="none" />

    <!-- Video Camera -->
    <rect x="58" y="48" width="12" height="10" rx="2" />
    <polygon points="70,50 76,47 76,59 70,56" />
    <!-- Film reels -->
    <circle cx="61" cy="45" r="3" />
    <circle cx="68" cy="45" r="3" />
    <circle cx="61" cy="45" r="0.5" fill="none" />
    <circle cx="68" cy="45" r="0.5" fill="none" />
  </g>
</svg>
